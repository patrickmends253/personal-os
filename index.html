<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F141C">
  <meta name="color-scheme" content="dark">
  <title>Personal OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #0F141C;
      --card: #151C27;
      --line: rgba(232, 235, 240, 0.09);
      --text: #E8EBF0;
      --muted: #8A94A6;
      --accent: #F5A524;
      --ok: #4ADE80;
      --off: #F87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 18px);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }
    .wordmark {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .wordmark b { color: var(--accent); font-weight: 600; }
    .chip {
      font-size: 0.75rem;
      padding: 4px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
    }
    .chip::before {
      content: "";
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ok);
      margin-right: 7px;
    }
    .chip.off::before { background: var(--off); }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 560px;
      width: 100%;
      margin: 0 auto;
    }
    h1 {
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .date {
      color: var(--muted);
      font-size: 1.05rem;
      margin-top: 10px;
    }
    .card {
      margin-top: 40px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
    }
    .bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .bars span { height: 5px; border-radius: 3px; background: var(--line); }
    .bars span:nth-child(1) { width: 44px; background: var(--accent); }
    .bars span:nth-child(2) { width: 32px; }
    .bars span:nth-child(3) { width: 20px; }
    .card h2 { font-size: 1.1rem; font-weight: 600; }
    .card p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
      margin-top: 6px;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">Personal <b>OS</b></div>
    <div class="chip" id="net">online</div>
  </header>

  <main>
    <h1 id="greet">Olá.</h1>
    <p class="date" id="date"></p>
    <div class="card">
      <div class="bars"><span></span><span></span><span></span></div>
      <h2>A base está pronta.</h2>
      <p>Tarefas, calendário e sincronização chegam nos próximos passos.</p>
    </div>
  </main>

  <footer>v0.1 · passo 1 de 6</footer>

  <script type="module">
    const hour = new Date().getHours();
    document.getElementById('greet').textContent =
      hour < 12 ? 'Bom dia.' : hour < 20 ? 'Boa tarde.' : 'Boa noite.';

    const date = new Date().toLocaleDateString('pt-PT', {
      weekday: 'long', day: 'numeric', month: 'long'
    });
    document.getElementById('date').textContent =
      date.charAt(0).toUpperCase() + date.slice(1);

    const net = document.getElementById('net');
    const paintNet = () => {
      net.textContent = navigator.onLine ? 'online' : 'offline';
      net.classList.toggle('off', !navigator.onLine);
    };
    addEventListener('online', paintNet);
    addEventListener('offline', paintNet);
    paintNet();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
