<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0F141C">
  <meta name="color-scheme" content="dark">
  <title>Personal OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #0F141C;
      --card: #151C27;
      --line: rgba(232, 235, 240, 0.09);
      --field: #0C1119;
      --text: #E8EBF0;
      --muted: #8A94A6;
      --accent: #F5A524;
      --ok: #4ADE80;
      --off: #F87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    input, button { font-family: inherit; }

    /* ---- view switching, driven by body[data-view] ---- */
    .view { display: none; min-height: 100%; flex-direction: column; }
    body[data-view="loading"] .view-loading { display: flex; }
    body[data-view="auth"]    .view-auth    { display: flex; }
    body[data-view="app"]     .view-app     { display: flex; }

    .wrap {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 18px);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .wordmark {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .wordmark b { color: var(--accent); font-weight: 600; }

    /* ---- loading ---- */
    .view-loading .wrap { justify-content: center; align-items: center; }
    .dots { display: flex; gap: 8px; }
    .dots span {
      width: 9px; height: 9px; border-radius: 50%; background: var(--muted);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.16s; }
    .dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

    /* ---- auth ---- */
    .view-auth .wrap { justify-content: center; }
    .auth-box { display: flex; flex-direction: column; }
    .auth-box h1 {
      font-size: clamp(2.2rem, 9vw, 3rem);
      font-weight: 650; letter-spacing: -0.02em; margin: 14px 0 26px;
    }
    form { display: flex; flex-direction: column; gap: 12px; }
    .field {
      background: var(--field);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 15px 16px;
      color: var(--text);
      font-size: 1rem;
    }
    .field::placeholder { color: var(--muted); }
    .field:focus { outline: none; border-color: var(--accent); }
    .btn {
      background: var(--accent);
      color: #1A1200;
      border: none;
      border-radius: 13px;
      padding: 15px 16px;
      font-size: 1rem;
      font-weight: 650;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .auth-msg { color: var(--off); font-size: 0.9rem; min-height: 1.2em; margin-top: 14px; }

    /* ---- app ---- */
    .view-app header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .chip {
      font-size: 0.75rem; padding: 4px 11px; border-radius: 999px;
      border: 1px solid var(--line); color: var(--muted);
    }
    .chip::before {
      content: ""; display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: var(--ok); margin-right: 7px;
    }
    .chip.off::before { background: var(--off); }

    .view-app main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    h1#greet { font-size: clamp(2.3rem, 9vw, 3.2rem); font-weight: 650; letter-spacing: -0.02em; line-height: 1.1; }
    .date { color: var(--muted); font-size: 1.05rem; margin-top: 10px; }

    .card {
      margin-top: 34px; background: var(--card);
      border: 1px solid var(--line); border-radius: 18px; padding: 22px;
    }
    .bars { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .bars span { height: 5px; border-radius: 3px; background: var(--line); }
    .bars span:nth-child(1) { width: 44px; background: var(--accent); }
    .bars span:nth-child(2) { width: 32px; }
    .bars span:nth-child(3) { width: 20px; }
    .card h2 { font-size: 1.1rem; font-weight: 600; }
    .card > p { color: var(--muted); font-size: 0.92rem; line-height: 1.5; margin-top: 6px; }

    .sync-row { display: flex; gap: 10px; margin-top: 16px; }
    .sync-row .field { flex: 1; }
    .sync-row .btn { margin-top: 0; padding: 0 18px; white-space: nowrap; }
    .sync-status { color: var(--muted); font-size: 0.9rem; margin-top: 12px; line-height: 1.45; }
    .sync-status b { color: var(--text); font-weight: 600; }

    .view-app footer {
      display: flex; align-items: center; justify-content: space-between;
      color: var(--muted); font-size: 0.8rem; margin-top: 8px;
    }
    .linkbtn {
      background: none; border: none; color: var(--muted);
      font-size: 0.8rem; text-decoration: underline; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body data-view="loading">

  <!-- LOADING -->
  <div class="view view-loading">
    <div class="wrap">
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- AUTH -->
  <div class="view view-auth">
    <div class="wrap">
      <div class="auth-box">
        <div class="wordmark">Personal <b>OS</b></div>
        <h1>Entrar</h1>
        <form id="login-form">
          <input class="field" id="email" type="email" placeholder="Email"
                 autocomplete="username" inputmode="email" required>
          <input class="field" id="password" type="password" placeholder="Palavra-passe"
                 autocomplete="current-password" required>
          <button class="btn" id="login-btn" type="submit">Entrar</button>
        </form>
        <p class="auth-msg" id="auth-msg"></p>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="view view-app">
    <div class="wrap">
      <header>
        <div class="wordmark">Personal <b>OS</b></div>
        <div class="chip" id="net">online</div>
      </header>

      <main>
        <h1 id="greet">Olá.</h1>
        <p class="date" id="date"></p>

        <div class="card">
          <div class="bars"><span></span><span></span><span></span></div>
          <h2>Teste de sincronização</h2>
          <p>Escreve algo e guarda. Abre a app noutro dispositivo (ou recarrega) e verás aparecer — é a prova de que a sincronização funciona. Isto é temporário; sai quando as Tarefas chegarem.</p>
          <div class="sync-row">
            <input class="field" id="sync-input" type="text" placeholder="Escreve algo…" autocomplete="off">
            <button class="btn" id="sync-save" type="button">Guardar</button>
          </div>
          <p class="sync-status" id="sync-status">A carregar…</p>
        </div>
      </main>

      <footer>
        <span id="user-email"></span>
        <button class="linkbtn" id="signout" type="button">Sair</button>
      </footer>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
